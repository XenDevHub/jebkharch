version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jebkharch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-jebkharch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jebkharch_dev}
      POSTGRES_DB: ${DB_NAME:-jebkharch_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jebkharch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jebkharch_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
